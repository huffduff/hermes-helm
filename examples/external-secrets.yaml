# ==============================================================================
# Example: External secrets (Sealed Secrets, External Secrets Operator, Vault)
# ==============================================================================
# Create the Secret separately (e.g., via SealedSecret), then reference it here.
#
# Usage:
#   helm install hermes ./chart -f examples/external-secrets.yaml
# ==============================================================================
#
# Your Secret should look like:
#
#   apiVersion: v1
#   kind: Secret
#   metadata:
#     name: hermes-credentials
#   type: Opaque
#   stringData:
#     OPENROUTER_API_KEY: "sk-or-v1-..."
#     TELEGRAM_BOT_TOKEN: "123456:ABC..."
#     API_SERVER_KEY: "..."
#     GITHUB_TOKEN: "ghp_..."
# ==============================================================================

hermes:
  command: ["gateway", "run"]

# Don't create a Secret — use the pre-existing one.
secrets: {}
existingSecret: "hermes-credentials"

gateway:
  telegram:
    enabled: true
    homeChannel: "your-chat-name"
    allowedUsers: "123456789"

apiServer:
  enabled: true
  port: 8642

github:
  enabled: true

persistence:
  enabled: true
  size: 10Gi
