{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "hermes.fullname" . }}
  labels:
    {{- include "hermes.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ required "httpRoute.parentGateway is required when httpRoute is enabled" .Values.httpRoute.parentGateway }}
      {{- if .Values.httpRoute.sectionName }}
      sectionName: {{ .Values.httpRoute.sectionName }}
      {{- end }}
  {{- if .Values.httpRoute.hostnames }}
  hostnames:
    {{- range .Values.httpRoute.hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.httpRoute.rules }}
    - matches:
        {{- toYaml .matches | nindent 8 }}
      backendRefs:
        - name: {{ include "hermes.fullname" $ }}
          port: {{ $.Values.service.port }}
    {{- end }}
{{- end }}
